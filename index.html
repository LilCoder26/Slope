<script>
    function mergeFiles(fileParts) {
        return new Promise((resolve, reject) => {
            let buffers = [];

            function fetchPart(i) {
                if (i >= fileParts.length) {
                    let blob = new Blob(buffers);
                    resolve(URL.createObjectURL(blob));
                    return;
                }
                fetch(fileParts[i])
                    .then(r => r.arrayBuffer())
                    .then(buf => {
                        buffers.push(buf);
                        fetchPart(i + 1);
                    })
                    .catch(reject);
            }
            fetchPart(0);
        });
    }

    function getParts(base, start, end) {
        let arr = [];
        for (let i = start; i <= end; i++) arr.push(base + ".part" + i);
        return arr;
    }

    window.onload = function () {
        resizeGameContainer();

        mergeFiles(
            getParts(
                "https://cdn.jsdelivr.net/gh/gn-math/assets@51462750d29b68ac1e33887c1bf13d9c478d5ead/198/Build/WEB1.2.1.data.unityweb",
                1,
                2
            )
        ).then(dataUrl => {

            // Build JSON config Unity expects
            const config = {
                companyName: "Slope Plus",
                productName: "Slope Plus",
                dataUrl: dataUrl,
                wasmCodeUrl: "https://cdn.jsdelivr.net/gh/gn-math/assets@51462750d29b68ac1e33887c1bf13d9c478d5ead/198/Build/WEB1.2.1.wasm.code.unityweb",
                wasmFrameworkUrl: "https://cdn.jsdelivr.net/gh/gn-math/assets@51462750d29b68ac1e33887c1bf13d9c478d5ead/198/Build/WEB1.2.1.wasm.framework.unityweb",
                streamingAssetsUrl: "StreamingAssets",
                backgroundColor: "#000000",
                splashScreenStyle: "Dark",
                graphicsAPI: ["WebGL 2.0", "WebGL 1.0"]
            };

            // Turn JSON into a blob UnityLoader can load
            const blob = new Blob([JSON.stringify(config)], { type: "application/json" });
            const configUrl = URL.createObjectURL(blob);

            // Correct UnityLoader call
            UnityLoader.instantiate("gameContainer", configUrl, {
                onProgress: UnityProgress
            });
        });
    };

    window.addEventListener("resize", resizeGameContainer);

    function resizeGameContainer() {
        const container = document.getElementById("gameContainer");
        if (!container) return;
        container.style.width = window.innerWidth + "px";
        container.style.height = window.innerHeight + "px";
    }
</script>
